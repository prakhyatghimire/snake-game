<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake Arcade | Phaser 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      box-shadow: 
        0 0 60px rgba(0, 217, 255, 0.3),
        0 0 120px rgba(0, 217, 255, 0.15),
        inset 0 0 60px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      border: 2px solid #00d9ff;
    }
    #game-container canvas {
      display: block;
      border-radius: 6px;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 6px;
    }
    #score-board {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: #00d9ff;
      text-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff;
      z-index: 100;
      pointer-events: none;
    }
    .score-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .score-label { font-size: 0.7rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; }
    .score-value { font-size: 1.8rem; font-weight: 700; }
    #score-value { color: #ff6b6b; text-shadow: 0 0 10px #ff6b6b, 0 0 20px #ff6b6b; }
    #hiscore-value { color: #ffd700; text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700; }
    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(0, 217, 255, 0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      body { align-items: flex-start; padding-top: 20px; }
      #game-container { border-radius: 0; border-left: none; border-right: none; }
      #game-container canvas { border-radius: 0; }
      #score-board { top: 12px; font-size: 0.9rem; gap: 24px; }
      .score-value { font-size: 1.4rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay">
      <div id="score-board">
        <div class="score-item">
          <span class="score-label">Score</span>
          <span class="score-value" id="score-value">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">Hi-Score</span>
          <span class="score-value" id="hiscore-value">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">Length</span>
          <span class="score-value" id="length-value">3</span>
        </div>
      </div>
      <div id="controls-hint">ARROWS / WASD / SWIPE • SPACE TO PAUSE</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
