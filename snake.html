<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
      color: #00d9ff;
      text-shadow: 0 0 10px #00d9ff;
    }
    #score {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #ff6b6b;
    }
    #canvas {
      border: 3px solid #00d9ff;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
      background: #0f0f23;
    }
    #controls {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      font-family: inherit;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #00b8d4;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    #mobile-controls {
      display: none;
      margin-top: 15px;
      gap: 10px;
    }
    .control-row {
      display: flex;
      gap: 10px;
    }
    .control-btn {
      width: 60px;
      height: 60px;
      font-size: 1.5rem;
      background: rgba(0, 217, 255, 0.2);
      border: 2px solid #00d9ff;
      color: #00d9ff;
    }
    .control-btn:active {
      background: #00d9ff;
      color: #1a1a2e;
    }
    @media (max-width: 600px) {
      #canvas {
        width: 100%;
        max-width: 350px;
        height: auto;
      }
      #mobile-controls {
        display: flex;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score">Score: 0</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="controls">
    <button id="startBtn">Start Game</button>
    <button id="pauseBtn" disabled>Pause</button>
  </div>
  <div id="mobile-controls">
    <div class="control-row">
      <button class="control-btn" data-dir="up">▲</button>
    </div>
    <div class="control-row">
      <button class="control-btn" data-dir="left">◀</button>
      <button class="control-btn" data-dir="down">▼</button>
      <button class="control-btn" data-dir="right">▶</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;

    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameLoop = null;
    let isPaused = false;
    let isGameOver = false;
    let speed = 100;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      score = 0;
      isGameOver = false;
      isPaused = false;
      speed = 100;
      scoreEl.textContent = `Score: ${score}`;
      placeFood();
      startBtn.textContent = 'Restart';
      startBtn.disabled = false;
      pauseBtn.disabled = false;
      pauseBtn.textContent = 'Pause';
    }

    function placeFood() {
      food.x = Math.floor(Math.random() * TILE_COUNT);
      food.y = Math.floor(Math.random() * TILE_COUNT);
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          placeFood();
          return;
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawFood();
      drawSnake();
    }

    function drawFood() {
      const gradient = ctx.createRadialGradient(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        0,
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2
      );
      gradient.addColorStop(0, '#ff6b6b');
      gradient.addColorStop(1, '#c92a2a');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const isHead = index === 0;
        const gradient = ctx.createLinearGradient(
          segment.x * GRID_SIZE,
          segment.y * GRID_SIZE,
          segment.x * GRID_SIZE + GRID_SIZE,
          segment.y * GRID_SIZE + GRID_SIZE
        );
        if (isHead) {
          gradient.addColorStop(0, '#00d9ff');
          gradient.addColorStop(1, '#0099cc');
        } else {
          const intensity = 1 - (index / snake.length) * 0.5;
          gradient.addColorStop(0, `rgba(0, 217, 255, ${intensity})`);
          gradient.addColorStop(1, `rgba(0, 153, 204, ${intensity})`);
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(
          segment.x * GRID_SIZE + 1,
          segment.y * GRID_SIZE + 1,
          GRID_SIZE - 2,
          GRID_SIZE - 2
        );

        if (isHead) {
          ctx.fillStyle = '#fff';
          const eyeSize = 4;
          const eyeOffset = 6;
          if (dx === 1) {
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - eyeOffset, segment.y * GRID_SIZE + 4, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - eyeOffset, segment.y * GRID_SIZE + GRID_SIZE - 8, eyeSize, eyeSize);
          } else if (dx === -1) {
            ctx.fillRect(segment.x * GRID_SIZE + 4, segment.y * GRID_SIZE + 4, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + 4, segment.y * GRID_SIZE + GRID_SIZE - 8, eyeSize, eyeSize);
          } else if (dy === 1) {
            ctx.fillRect(segment.x * GRID_SIZE + 4, segment.y * GRID_SIZE + GRID_SIZE - eyeOffset, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - 8, segment.y * GRID_SIZE + GRID_SIZE - eyeOffset, eyeSize, eyeSize);
          } else if (dy === -1) {
            ctx.fillRect(segment.x * GRID_SIZE + 4, segment.y * GRID_SIZE + 4, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + GRID_SIZE - 8, segment.y * GRID_SIZE + 4, eyeSize, eyeSize);
          }
        }
      });
    }

    function update() {
      if (isPaused || isGameOver) return;

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        gameOver();
        return;
      }

      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = `Score: ${score}`;
        placeFood();
        if (speed > 50) {
          speed -= 1;
          clearInterval(gameLoop);
          gameLoop = setInterval(gameStep, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function gameStep() {
      update();
    }

    function gameOver() {
      isGameOver = true;
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff6b6b';
      ctx.font = '30px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '16px Courier New';
      ctx.fillStyle = '#eee';
      ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
      ctx.fillText('Press Start to play again', canvas.width / 2, canvas.height / 2 + 55);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
    }

    function togglePause() {
      if (isGameOver) return;
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
    }

    function changeDirection(newDx, newDy) {
      if (isGameOver || isPaused) return;
      if ((newDx === -dx && newDy === -dy) || (newDx === dx && newDy === dy)) return;
      dx = newDx;
      dy = newDy;
    }

    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          changeDirection(0, -1);
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          changeDirection(0, 1);
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          changeDirection(-1, 0);
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          changeDirection(1, 0);
          break;
        case ' ':
        case 'Escape':
          togglePause();
          break;
      }
    });

    startBtn.addEventListener('click', () => {
      if (gameLoop) clearInterval(gameLoop);
      initGame();
      gameLoop = setInterval(gameStep, speed);
      startBtn.disabled = true;
    });

    pauseBtn.addEventListener('click', togglePause);

    document.querySelectorAll('.control-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const dir = btn.dataset.dir;
        switch (dir) {
          case 'up': changeDirection(0, -1); break;
          case 'down': changeDirection(0, 1); break;
          case 'left': changeDirection(-1, 0); break;
          case 'right': changeDirection(1, 0); break;
        }
      });
    });

    initGame();
    draw();
  </script>
</body>
</html>
